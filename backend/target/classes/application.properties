spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:${DB_PORT:5433}/catchitdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:catchit}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

# Hibernate batch configuration for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.session.store-type=redis
spring.session.timeout=${SESSION_TIMEOUT:30m}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

notifications.cache.ttl-minutes=${NOTIFICATIONS_CACHE_TTL_MINUTES:5}
notifications.retention.days=${NOTIFICATIONS_RETENTION_DAYS:60}
notifications.retention.cron=${NOTIFICATIONS_RETENTION_CRON:0 0 3 * * *}

payment.service.base-url=${PAYMENT_SERVICE_BASE_URL:http://localhost:8081}
payment.service.authorize-path=${PAYMENT_SERVICE_AUTHORIZE_PATH:/api/payments/authorize}

resilience4j.circuitbreaker.instances.paymentService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.paymentService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.paymentService.timeout-duration=2s

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

otp.base-url=${OTP_BASE_URL:http://localhost:8083}
otp.router-id=${OTP_ROUTER_ID:default}
otp.timeout-ms=${OTP_TIMEOUT_MS:30000}
routing.cache-ttl-seconds=${ROUTING_CACHE_TTL_SECONDS:300}
routing.transfer-penalty=${ROUTING_TRANSFER_PENALTY:180}
routing.walk-reluctance=${ROUTING_WALK_RELUCTANCE:18.0}
routing.max-walk-distance-meters=${ROUTING_MAX_WALK_DISTANCE_METERS:1000}
