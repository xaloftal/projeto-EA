services:
  db:
    image: postgres:16-alpine
    container_name: catchit-db
    environment:
      POSTGRES_DB: ${DB_NAME:-catchitdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - catchit_postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-catchitdb}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: catchit-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - catchit_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catchit-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-catchitdb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: catchit
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
      SCRIPT_MOCK_DATA_DIR: /data/mock
    volumes:
      - ./script_mock_data/data:/data/mock:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-service:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/api/vehicles/simulation >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 100s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: catchit-payment-service
    environment:
      PAYMENT_DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-catchitdb}
      PAYMENT_DB_USER: ${DB_USER:-postgres}
      PAYMENT_DB_PASSWORD: ${DB_PASSWORD:-1234}
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: payment
    ports:
      - "${PAYMENT_SERVICE_PORT:-8081}:8081"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/catchit-mobile
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: catchit-frontend
    ports:
      - "9000:80"
    depends_on:
      backend:
        condition: service_healthy

  otp:
    build:
      context: ./otp
      dockerfile: Dockerfile
    image: catchit-otp:local
    container_name: catchit-otp
    ports:
      - "8085:8080"
    restart: unless-stopped
    mem_limit: 16g
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8085/otp/actuators/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  catchit_postgres_data:
    name: catchit_postgres_data
  catchit_redis_data:
    name: catchit_redis_data
