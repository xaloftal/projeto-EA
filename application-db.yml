server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/catchitdb
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: catchit
    show-sql: false

  # Desativar WebSocket
  websocket:
    enabled: false

  # Desativar messaging
  messaging:
    stomp:
      enabled: false

logging:
  level:
    org.springframework.web.socket: OFF
    org.springframework.messaging: OFF
    PSM.Location.benchmark: INFO